<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tab Switcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1e1e1e;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            overflow: hidden;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 12px 16px;
        }

        .switcher {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 8px 4px;
            scrollbar-width: none;
            max-width: 100%;
        }

        .switcher::-webkit-scrollbar {
            display: none;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-width: 76px;
            max-width: 76px;
            padding: 10px 6px 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.12s, outline-color 0.12s;
            outline: 2px solid transparent;
        }

        .tab-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .tab-item.selected {
            background: rgba(60, 130, 246, 0.18);
            outline: 2px solid rgba(60, 130, 246, 0.55);
        }

        .tab-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: contain;
            background: #2a2a2a;
            flex-shrink: 0;
        }

        .tab-icon-placeholder {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: #888;
            flex-shrink: 0;
        }

        .tab-title {
            margin-top: 6px;
            font-size: 10px;
            line-height: 1.2;
            text-align: center;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #bbb;
        }

        .tab-item.selected .tab-title {
            color: #fff;
        }

        .hint {
            position: fixed;
            bottom: 6px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            color: #555;
        }

        .hint kbd {
            background: #333;
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 9px;
            color: #999;
        }
    </style>
</head>

<body>
    <div class="switcher" id="switcher"></div>
    <div class="hint">
        <kbd>←</kbd> <kbd>→</kbd> navigate &nbsp; <kbd>Enter</kbd> switch &nbsp; <kbd>Esc</kbd> cancel
    </div>
    <script src="switcher.js"></script>
</body>

</html>
