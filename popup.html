<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recent Tab Switcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 320px;
            max-height: 480px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: #1b2a2e;
            color: #c5d4d7;
        }

        .header {
            padding: 14px 16px 10px;
            border-bottom: 1px solid #263c40;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .title {
            font-size: 13px;
            font-weight: 600;
            color: #e2eced;
            letter-spacing: -0.01em;
        }

        .badge {
            font-size: 10px;
            background: #1a3a3e;
            color: #7ec8cb;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .tab-list {
            max-height: 380px;
            overflow-y: auto;
            padding: 4px 0;
        }

        .tab-list::-webkit-scrollbar {
            width: 4px;
        }

        .tab-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .tab-list::-webkit-scrollbar-thumb {
            background: #2a4a4e;
            border-radius: 4px;
        }

        .tab-entry {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            cursor: pointer;
            transition: background 0.12s;
        }

        .tab-entry:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .tab-entry.current {
            background: rgba(94, 184, 188, 0.08);
        }

        .tab-favicon {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            object-fit: contain;
            flex-shrink: 0;
            background: #223438;
        }

        .tab-favicon-placeholder {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            background: #223438;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            color: #5a8387;
            flex-shrink: 0;
        }

        .tab-info {
            flex: 1;
            min-width: 0;
        }

        .tab-name {
            font-size: 12px;
            color: #d5e4e6;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tab-url {
            font-size: 10px;
            color: #4a6d71;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 1px;
        }

        .tab-rank {
            font-size: 9px;
            color: #3a5a5e;
            flex-shrink: 0;
            min-width: 16px;
            text-align: right;
        }

        .tab-entry.current .tab-rank {
            color: #5bb8bc;
        }

        .footer {
            padding: 8px 16px 10px;
            border-top: 1px solid #263c40;
            font-size: 10px;
            color: #4a6d71;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer a {
            color: #5bb8bc;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .shortcut-hint kbd {
            background: #1a3a3e;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 9px;
            color: #7ec8cb;
            font-family: inherit;
        }

        .empty-state {
            padding: 30px 16px;
            text-align: center;
            color: #4a6d71;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="title">Recent Tabs</div>
        <div class="badge" id="tabCount">0 tabs</div>
    </div>

    <div class="tab-list" id="tabList">
        <div class="empty-state">Loading tabs...</div>
    </div>

    <div class="footer">
        <span class="shortcut-hint">Switcher: <kbd>Ctrl+Q</kbd></span>
        <a href="#" id="shortcutLink">Settings</a>
    </div>

    <script src="popup.js"></script>
</body>

</html>
